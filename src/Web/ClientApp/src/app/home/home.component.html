<!-- Signed out: hero with call to action -->
<div class="hero" *ngIf="isAuthenticated === false">
  <div class="hero-card mat-elevation-z4">
    <span class="hero-logo">R</span>
    <h1>Welcome to RemSolution</h1>
    <p class="hero-tagline">
      Manage your rental fleet, clients and reservations in one place.
    </p>
    <div class="hero-actions">
      <a mat-raised-button color="primary" href="/Identity/Account/Login">
        <mat-icon>login</mat-icon> Sign in
      </a>
      <a mat-stroked-button color="primary" href="/Identity/Account/Register">Create an account</a>
    </div>
  </div>
</div>

<!-- Signed in: dashboard -->
<div class="dashboard" *ngIf="isAuthenticated">
  <div class="dash-header">
    <h1>Welcome back</h1>
    <p class="dash-subtitle">{{ displayName }}</p>
  </div>

  <div class="stat-row">
    <a class="stat-tile mat-elevation-z2" *ngFor="let stat of stats" [routerLink]="[stat.link]">
      <div class="stat-icon">
        <mat-icon>{{ stat.icon }}</mat-icon>
      </div>
      <div class="stat-body">
        <span class="stat-value">{{ stat.value === null ? '—' : stat.value }}</span>
        <span class="stat-label">{{ stat.label }}</span>
      </div>
    </a>
  </div>

  <div class="quick-actions mat-elevation-z2">
    <h2>Quick actions</h2>
    <div class="action-buttons">
      <a mat-raised-button color="primary" *ngFor="let action of quickActions" [routerLink]="[action.link]">
        <mat-icon>{{ action.icon }}</mat-icon> {{ action.label }}
      </a>
    </div>
  </div>
</div>
