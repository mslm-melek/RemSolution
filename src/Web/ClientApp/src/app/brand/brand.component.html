<div class="brand-card">
  <h2>Brands</h2>

  <!-- Add brand -->
  <div class="add-row">
    <input [(ngModel)]="newBrand" placeholder="New brand name" />
    <button mat-raised-button color="primary" (click)="addBrand()">Add</button>
  </div>

  <!-- Material Table -->
  <table mat-table [dataSource]="brands" class="mat-elevation-z2">

    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let brand">{{ brand.name }}</td>
    </ng-container>

    <!-- Delete Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let brand">
        <button mat-icon-button color="warn" (click)="deleteBrand(brand)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <!-- Pagination -->
  <mat-paginator [pageSize]="5"></mat-paginator>
</div>
