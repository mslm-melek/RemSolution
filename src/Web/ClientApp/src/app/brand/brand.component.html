<div class="brand-card mat-elevation-z4">
  <h2 class="title">Brands</h2>

  <!-- Add Brand Row -->
  <div class="add-row">
    <mat-form-field appearance="outline" class="brand-input">
      <mat-label>New Brand Name</mat-label>
      <input matInput [(ngModel)]="newBrand" placeholder="e.g. Volkswagen" />
      <mat-error *ngIf="errorMessage">{{ errorMessage }}</mat-error>

    </mat-form-field>

    <button mat-raised-button color="primary" (click)="addBrand()" [disabled]="!newBrand.trim()">
      <mat-icon>add</mat-icon> Add
    </button>
  </div>

  <!-- Material Table -->
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z2 full-width">

    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Brand Name</th>
      <td mat-cell *matCellDef="let brand">{{ brand.name }}</td>
    </ng-container>

    <!-- Delete Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="text-center">Actions</th>
      <td mat-cell *matCellDef="let brand" class="text-center">
        <button mat-icon-button color="warn" (click)="deleteBrand(brand)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator [pageSize]="5"></mat-paginator>
</div>
