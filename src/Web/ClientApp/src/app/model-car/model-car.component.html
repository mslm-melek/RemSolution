<div class="model-car-card mat-elevation-z4">
  <div class="header-row">
    <h2 class="title">Car Models</h2>
    <a mat-raised-button color="primary" [routerLink]="['/model-car/new']">
      <mat-icon>add</mat-icon> New Model
    </a>
  </div>

  <!-- Filters -->
  <div class="filter-row">
    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Brand</mat-label>
      <mat-select [(ngModel)]="filterBrandId" (selectionChange)="onFilter()">
        <mat-option [value]="null">All brands</mat-option>
        <mat-option *ngFor="let brand of brands" [value]="brand.id">
          {{ brand.name }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <button mat-button (click)="clearFilters()">Clear</button>
  </div>

  <!-- Material Table -->
  <table mat-table [dataSource]="modelCars" class="mat-elevation-z2 full-width">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let modelCar">{{ modelCar.name }}</td>
    </ng-container>

    <ng-container matColumnDef="brand">
      <th mat-header-cell *matHeaderCellDef>Brand</th>
      <td mat-cell *matCellDef="let modelCar">{{ modelCar.brandName }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="text-center">Actions</th>
      <td mat-cell *matCellDef="let modelCar" class="text-center">
        <a mat-icon-button color="primary" [routerLink]="['/model-car', modelCar.id]" aria-label="Edit">
          <mat-icon>edit</mat-icon>
        </a>
        <button mat-icon-button color="warn" (click)="deleteModelCar(modelCar)" aria-label="Delete">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell empty-row" [attr.colspan]="displayedColumns.length">No car models found.</td>
    </tr>
  </table>

  <!-- Server-side paginator -->
  <mat-paginator [length]="totalCount"
                 [pageIndex]="pageNumber - 1"
                 [pageSize]="pageSize"
                 [pageSizeOptions]="[5, 10, 25, 50]"
                 (page)="onPage($event)">
  </mat-paginator>
</div>
