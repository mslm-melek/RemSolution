<div class="agency-card mat-elevation-z4">
  <div class="header-row">
    <h2 class="title">Agencies</h2>
    <a mat-raised-button color="primary" [routerLink]="['/agency/new']">
      <mat-icon>add_business</mat-icon> New Agency
    </a>
  </div>

  <table mat-table [dataSource]="agencies" class="mat-elevation-z2 full-width">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let agency">{{ agency.name }}</td>
    </ng-container>

    <ng-container matColumnDef="country">
      <th mat-header-cell *matHeaderCellDef>Country</th>
      <td mat-cell *matCellDef="let agency">{{ agency.countryName }}</td>
    </ng-container>

    <ng-container matColumnDef="contact">
      <th mat-header-cell *matHeaderCellDef>Contact</th>
      <td mat-cell *matCellDef="let agency">
        <span *ngIf="agency.email">{{ agency.email }}</span>
        <span *ngIf="agency.email && agency.phoneNumber"> · </span>
        <span *ngIf="agency.phoneNumber">{{ agency.phoneNumber }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="currency">
      <th mat-header-cell *matHeaderCellDef>Currency</th>
      <td mat-cell *matCellDef="let agency">{{ agency.currency }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="text-center">Actions</th>
      <td mat-cell *matCellDef="let agency" class="text-center">
        <a mat-icon-button color="primary" [routerLink]="['/agency', agency.id]" matTooltip="Manage" aria-label="Manage">
          <mat-icon>settings</mat-icon>
        </a>
        <a mat-icon-button [routerLink]="['/agency', agency.id, 'edit']" matTooltip="Edit details" aria-label="Edit">
          <mat-icon>edit</mat-icon>
        </a>
        <button mat-icon-button color="warn" (click)="deleteAgency(agency)" matTooltip="Delete" aria-label="Delete">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell empty-row" [attr.colspan]="displayedColumns.length">No agencies yet.</td>
    </tr>
  </table>
</div>
