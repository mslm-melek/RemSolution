<div class="agency-card mat-elevation-z4">
  <div class="header-row">
    <h2 class="title">Cars (read-only)</h2>
    <a mat-button [routerLink]="['/agency', agencyId]">
      <mat-icon>arrow_back</mat-icon> Back to agency
    </a>
  </div>

  <table mat-table [dataSource]="cars" class="mat-elevation-z2 full-width">
    <ng-container matColumnDef="matricule">
      <th mat-header-cell *matHeaderCellDef>Matricule</th>
      <td mat-cell *matCellDef="let car">{{ car.matricule }}</td>
    </ng-container>
    <ng-container matColumnDef="model">
      <th mat-header-cell *matHeaderCellDef>Model</th>
      <td mat-cell *matCellDef="let car">{{ car.modelName }}</td>
    </ng-container>
    <ng-container matColumnDef="branch">
      <th mat-header-cell *matHeaderCellDef>Branch</th>
      <td mat-cell *matCellDef="let car">{{ car.branchName }}</td>
    </ng-container>
    <ng-container matColumnDef="color">
      <th mat-header-cell *matHeaderCellDef>Color</th>
      <td mat-cell *matCellDef="let car">{{ car.color }}</td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell empty-row" [attr.colspan]="displayedColumns.length">No cars found.</td>
    </tr>
  </table>

  <mat-paginator [length]="totalCount"
                 [pageIndex]="pageNumber - 1"
                 [pageSize]="pageSize"
                 [pageSizeOptions]="[5, 10, 25, 50]"
                 (page)="onPage($event)">
  </mat-paginator>
</div>
