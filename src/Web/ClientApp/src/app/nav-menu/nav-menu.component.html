<header>
  <mat-toolbar color="primary" class="nav-toolbar">
    <a class="nav-brand" [routerLink]="['/']">RemSolution.Web</a>

    <span class="nav-spacer"></span>

    <button mat-icon-button
            class="nav-toggler"
            aria-label="Toggle navigation"
            [attr.aria-expanded]="isExpanded"
            (click)="toggle()">
      <mat-icon>menu</mat-icon>
    </button>

    <nav class="nav-links" [class.expanded]="isExpanded">
      <a mat-button
         [routerLink]="['/']"
         [routerLinkActive]="['link-active']"
         [routerLinkActiveOptions]="{ exact: true }"
         (click)="collapse()">Home</a>
      <a mat-button
         [routerLink]="['/brand']"
         [routerLinkActive]="['link-active']"
         (click)="collapse()">Car Brands</a>
      <a mat-button
         [routerLink]="['/model-car']"
         [routerLinkActive]="['link-active']"
         (click)="collapse()">Car Models</a>
      <a mat-button
         [routerLink]="['/car']"
         [routerLinkActive]="['link-active']"
         (click)="collapse()">Cars</a>
      <a mat-button href="/api" target="_blank">API</a>
      <a mat-button href="/Identity/Account/Manage">Account</a>
    </nav>
  </mat-toolbar>
</header>
