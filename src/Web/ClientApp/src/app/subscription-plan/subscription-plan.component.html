<div class="plan-card mat-elevation-z4">
  <div class="header-row">
    <h2 class="title">Subscription Plans</h2>
    <a mat-raised-button color="primary" [routerLink]="['/subscription-plan/new']">
      <mat-icon>add</mat-icon> New Plan
    </a>
  </div>

  <table mat-table [dataSource]="plans" class="mat-elevation-z2 full-width">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let p">{{ p.name }}</td>
    </ng-container>
    <ng-container matColumnDef="maxCars">
      <th mat-header-cell *matHeaderCellDef>Max Cars</th>
      <td mat-cell *matCellDef="let p">{{ p.maxCars }}</td>
    </ng-container>
    <ng-container matColumnDef="maxClients">
      <th mat-header-cell *matHeaderCellDef>Max Clients</th>
      <td mat-cell *matCellDef="let p">{{ p.maxClients }}</td>
    </ng-container>
    <ng-container matColumnDef="maxUsers">
      <th mat-header-cell *matHeaderCellDef>Max Users</th>
      <td mat-cell *matCellDef="let p">{{ p.maxUsers }}</td>
    </ng-container>
    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef>Price</th>
      <td mat-cell *matCellDef="let p">{{ p.price }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="text-center">Actions</th>
      <td mat-cell *matCellDef="let p" class="text-center">
        <a mat-icon-button color="primary" [routerLink]="['/subscription-plan', p.id]" aria-label="Edit">
          <mat-icon>edit</mat-icon>
        </a>
        <button mat-icon-button color="warn" (click)="deletePlan(p)" aria-label="Delete">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell empty-row" [attr.colspan]="displayedColumns.length">No plans yet.</td>
    </tr>
  </table>
</div>
